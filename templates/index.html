<!DOCTYPE html>
<html>
<head>
    <title>Spam Classifier</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg,#170b36,#111b04); text-align:center; }
        .box { background:rgb(161, 85, 177); padding:30px; margin:50px auto; width:400px; border-radius:10px; color: white;}
        textarea { width:100%; height:100px;background-color:white; color: white;border-radius: 4px;border: wheat;}
        button { padding:10px 20px; margin-top:10px; background-color: aqua; color: black; border: 2px solid white;border-radius: 3px;}
        a { margin:10px; display:inline-block; color: rgb(60, 255, 0); }



        .navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#5a6c88;
    padding:15px 30px;
}

.logo{
    color:white;
    font-size:20px;
    font-weight:bold;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:16px;
}

.nav-links a:hover{
    color:#38bdf8;
}

.logout a{
    background:red;
    color:white;
    padding:8px 15px;
    border-radius:5px;
    text-decoration:none;
}
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">
        Email Spam Classifier
    </div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/history">History</a>
        <a href="/analytics">Analytics</a>
        <a href="/admin">Admin</a>
    </div>

    <div class="logout">
        <a href="/logout">Logout</a>
    </div>
</nav>
<div class="box">
    <h2>Email Spam Classifier</h2>

    <form action="/predict" method="post">
        <textarea name="message" placeholder="Enter message..."></textarea>
        <br>
        <button>Check</button>
    </form>

    {% if prediction %}
        <h3 style="color:green;">{{ prediction }}</h3>
    {% endif %}
    
</div>

</body>
</html>
