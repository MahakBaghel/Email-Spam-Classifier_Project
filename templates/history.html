<!DOCTYPE html>
<html>
<head>
    <title>History</title>
</head>
<body>

<h2>Your History</h2>

<table border="1">
<tr>
    <th>Message</th>
    <th>Result</th>
    <th>Date</th>
</tr>

{% for item in data %}
<tr>
    <td>{{ item.message }}</td>
    <td>{{ item.result }}</td>
    <td>{{ item.date }}</td>
   
</tr>
{% endfor %}

</table>

<a href="/">Back</a>

</body>
</html>
