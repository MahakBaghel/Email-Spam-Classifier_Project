<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; background: #4e3270; display:flex; justify-content:center; align-items:center; height:100vh;}
        .box { background:rgb(137, 177, 43); padding:30px; border-radius:10px; width:300px; text-align:center;}
        input, button { width:100%; padding:10px; margin:8px 0; }
        a { text-decoration:none; }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    {% with messages = get_flashed_messages() %}
      {% for msg in messages %}
        <p style="color:red;">{{ msg }}</p>
      {% endfor %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>

    <p><a href="/register">Register</a></p>
    <p><a href="/reset">Forgot Password?</a></p>
</div>

</body>
</html>
